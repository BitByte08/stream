name: Build & Release

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu
      - uses: Swatinem/rust-cache@v2
      - name: Install cross-compilation dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
      - name: Check
        run: cargo check --target aarch64-unknown-linux-gnu
      - name: Run tests (native)
        run: cargo test

  build-deb:
    name: Build .deb for RPi4 (ARM64)
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu
      - uses: Swatinem/rust-cache@v2

      - name: Install cross-compilation toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu pkg-config
          cargo install cargo-deb

      - name: Build release binary
        run: cargo build --release --target aarch64-unknown-linux-gnu

      - name: Build .deb package
        run: cargo deb --target aarch64-unknown-linux-gnu

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: stream-cli-arm64-deb
          path: target/aarch64-unknown-linux-gnu/debian/*.deb

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: target/aarch64-unknown-linux-gnu/debian/*.deb
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
